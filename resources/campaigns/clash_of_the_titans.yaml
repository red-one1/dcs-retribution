description:
  <p><strong>This campaign utilises both Afghanistan East and West. It is intended to be run with CurrentHill's USA, Russia, and 
  China Asset Packs installed, although this is not mandatory.</strong></p>
  <p>In the rugged heart of Afghanistan, the balance of power is tipping. Clash of the Titans is a high-stakes campaign set during 
  a fictional escalation in 2006, where NATO-led BLUFOR forces face off against a resurgent and well-equipped REDFOR coalition. 
  BLUFOR holds the vital eastern corridor, anchored by the fortified positions at Bagram Airfield, the strategic capital of Kabul, 
  and the forward base at Sharana. A recent offensive has resulted in REDFOR now controlling the southern and western strongholds of 
  Kandahar, Camp Bastion, and Tarinkot, with each having been since been heavily fortified. Air superiority is hotly contested, and both 
  sides are committing rotary and fixed-wing assets to interdiction, close air support, and deep strike missions. This is no border 
  skirmish. This is a theatre-wide confrontation where every flight counts and every decision could tilt the balance. Welcome to 
  Clash of the Titans. The skies over Afghanistan have never been more dangerous.</p>
