carrier_capable: true
description:
  "The F-35C Lightning II is a single-seat, single-engine, stealth multirole fighter aircraft designed for carrier operations. As the naval variant of the Joint Strike Fighter program, the F-35C features a larger, folding wing, strengthened landing gear, and increased internal fuel capacity for long-range missions at sea.

  The F-35C carries the same advanced sensor suite found across the Lightning II family, including an AESA radar, distributed aperture system, electro-optical targeting system, and a helmet-mounted display. It can carry precision-guided weapons internally for stealth missions or externally when low observability is not required.

  The aircraft is optimized for long-range strike, fleet defense, and networked operations in the maritime environment. Its large wing provides excellent low-speed handling for carrier approaches, while its stealth and sensor fusion give it a decisive advantage in contested airspace.

  Despite its carrier-specific enhancements, the F-35C remains easy to fly, with highly automated systems that reduce workload and allow the pilot to focus on mission execution."

