description: #CoPilot Generated
  "The F-35B Lightning II is a single-seat, single-engine, stealth multirole fighter aircraft designed for short takeoff and vertical landing (STOVL) operations. Developed for the U.S. Marine Corps and allied expeditionary forces, the F-35B brings fifth-generation capability to amphibious assault ships, forward operating bases, and austere environments where conventional fighters cannot operate.

  The F-35B features an advanced suite of fused sensors, including an AESA radar, electro-optical targeting system, distributed aperture system, and a helmet-mounted display that provides the pilot with a seamless, 360-degree view of the battlespace. In addition to its internal 25mm cannon, the F-35B can employ a wide range of precision-guided air-to-surface weapons and modern air-to-air missiles, carried internally for stealth or externally when low observability is not required.

  The aircraft's defining feature is its STOVL propulsion system, which uses a shaft-driven lift fan and vectoring rear nozzle to enable vertical landings and extremely short takeoffs. While not optimized for high-end dogfighting, the F-35B's powerful engine, advanced flight controls, and 7-G maneuvering capability make it a capable close-in fighter. Its true strength lies in its ability to gather, fuse, and share information across the battlespace while operating from locations inaccessible to traditional jets.

  Despite its complexity, the F-35B is designed to be pilot-friendly, with highly automated systems and an intuitive cockpit that reduce workload and allow the pilot to focus on mission execution."

